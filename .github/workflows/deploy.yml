name: CostsCrunch CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  AWS_REGION: us-east-1
  # When set to 'true' (via GitHub Actions variable), staging is bypassed
  SKIP_STAGING: ${{ vars.SKIP_STAGING || 'false' }}

jobs:
  # ─── Quality Gate ────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test -- --coverage --passWithNoTests
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─── Security Scans ──────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SAST — Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/aws-lambda
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Dependency audit
        run: npm audit --audit-level=high
      - name: Secrets scan — Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Build & CDK Synth ───────────────────────────────────────────────────────
  build:
    name: Build & Synth
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build backend
        run: npm run build -w backend
      - name: Build frontend
        run: npm run build -w frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}
      - name: CDK Synth (validate templates)
        run: npm run synth -w infrastructure
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            backend/dist/
            frontend/dist/
          retention-days: 7

  # ─── Deploy to Staging ───────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging') && env.SKIP_STAGING != 'true'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.STAGING_GITHUB_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - name: CDK Deploy — Staging
        run: npm run deploy:staging -w infrastructure
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID_STAGING }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
      - name: E2E tests — Playwright
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

  # ─── Deploy to Production ────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy — Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    # Run if build succeeded AND (staging succeeded OR staging was skipped)
    if: |
      always() && 
      needs.build.result == 'success' && 
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped') &&
      github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://app.costscrunch.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.PROD_GITHUB_ROLE_ARN }}
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - name: CDK Deploy — Production
        run: npm run deploy:prod -w infrastructure
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID_PROD }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
      - name: Deploy frontend to S3 + invalidate CloudFront
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.PROD_ASSETS_BUCKET }} --delete --cache-control "public,max-age=31536000,immutable"
          aws s3 cp frontend/dist/index.html s3://${{ secrets.PROD_ASSETS_BUCKET }}/index.html --cache-control "no-cache"
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} --paths "/*"
      - name: Smoke test production
        run: |
          # Verify health endpoint with 30s timeout and fail on non-200
          APP_URL="https://api.costscrunch.io"
          curl -f --max-time 30 "${APP_URL}/health" || exit 1
          echo "Production health check passed ✅"
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "CostsCrunch production deploy ${{ job.status }} — ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()

  # ─── Rollback (manual trigger) ───────────────────────────────────────────────
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Rollback CDK stack
        run: |
          echo "Rolling back to previous stack version..."