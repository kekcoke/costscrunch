# ─── Costscrunch — LocalStack dev/test environment ─────────────────────────────
# Services mocked: DynamoDB, S3, SES, SQS, SNS, EventBridge, Lambda, Textract,
#                  SSM, CloudFront, Cognito, ElastiCache, KMS, IAM, Logs, WAF
#
# Usage:
#   Build:  docker compose -f docker-compose.localstack.yml build
#   Start:  docker compose -f docker-compose.localstack.yml up -d
#   Stop:   docker compose -f docker-compose.localstack.yml down
#   Logs:   docker compose -f docker-compose.localstack.yml logs -f localstack
#   Reset:  docker compose -f docker-compose.localstack.yml down -v && docker compose -f docker-compose.localstack.yml up -d

services:
  localstack:
    image: localstack/localstack:3.5
    container_name: costscrunch-localstack
    ports:
      - "4566:4566"  # Main LocalStack edge port/gateway
    environment:
      # Free tier services only — paid-tier services (cognito, elasticache,
      # textract, bedrock) are excluded; attempting to start them errors out.
      - SERVICES=dynamodb,eventbridge,kms,lambda,logs,iam,s3,ses,sqs,sns,secretsmanager,ssm
      - DEBUG=0
      - PERSISTENCE=1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
      - DEFAULT_REGION=us-east-1
      - ACCESS_KEY_ID=test
      - SECRET_ACCESS_KEY=test
      - HOSTNAME_EXTERNAL=localhost
      - EAGER_SERVICE_LOADING=1
      - DATA_DIR=/var/lib/localstack
      - DISABLE_CORS_HEADERS=0
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      # - ./localstack/init:/etc/localstack/init/ready.d  # Auto-run init scripts
      # - ./localstack/scripts:/etc/localstack/scripts  # Custom scripts for service setup
      # - ./localstack/config:/etc/localstack/config  # Custom config files for services
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── LocalStack seed runner (one-shot) ───────────────────────────────────────
  localstack-seed:
    image: amazon/aws-cli:2.7.32
    container_name: costscrunch-localstack-seed
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - ./localstack/seed:/seed  # Seed scripts to initialize LocalStack services
    entrypoint: ["/bin/bash", "/seed/setup.sh"]
    restart: "no"  # Run once and exit
  
volumes:
  localstack-data:
    name: costscrunch-localstack-data