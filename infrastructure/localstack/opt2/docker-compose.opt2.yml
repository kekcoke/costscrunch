# ─── Option 2 override — deploy Lambda + API GW inside LocalStack ────────────
# Requires: sam build --template infrastructure/sam/template.yaml
#
# Usage:
#   sam build --template infrastructure/sam/template.yaml
#   docker compose -f docker-compose.localstack.yml \
#     -f infrastructure/localstack/opt2/docker-compose.opt2.yml up -d
#
# Endpoints available at http://localhost:4566/restapis/<api-id>/local/_user_request_/
# Check API ID: docker compose logs localstack 2>&1 | grep "Created API"

services:
  localstack:
    environment:
      # Enable Lambda execution via Docker-in-Docker
      - LAMBDA_EXECUTOR=docker-reuse
      - LAMBDA_REMOTE_DOCKER=true
      # Ensure Lambda service is loaded
      - SERVICES=dynamodb,eventbridge,kms,lambda,logs,iam,s3,ses,sqs,sns,secretsmanager,ssm,events,apigateway,cloudfront
    volumes:
      # Mount SAM build artifacts for Lambda deployment
      - ../../../.aws-sam:/opt/sam-build:ro
      # Mount bootstrap script as LocalStack init hook
      - ./bootstrap.sh:/etc/localstack/init/ready.d/99-bootstrap.sh:ro
      # Mount backend source for Lambda container code access
      - ../../../backend:/opt/backend:ro
