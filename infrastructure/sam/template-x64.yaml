AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CostsCrunch local dev API — SAM CLI (Parameterized x86_64)

Parameters:
  TableNameMain:
    Type: String
    Default: costscrunch-dev-main
  BucketUploadsName:
    Type: String
    Default: costscrunch-dev-uploads-000000000000
  TextractSnsTopicArn:
    Type: String
    Default: arn:aws:sns:us-east-1:000000000000:costscrunch-dev-textract-completion
  TextractRoleArn:
    Type: String
    Default: arn:aws:iam::000000000000:role/test-role
  FromEmail:
    Type: String
    Default: noreply@costscrunch.dev

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Timeout: 30
  HttpApi:
    CorsConfiguration:
      AllowOrigins:
        - "*"
      AllowMethods:
        - GET
        - POST
        - PATCH
        - DELETE
        - OPTIONS
      AllowHeaders:
        - "*"
      MaxAge: 3600

Resources:
  LocalApi:
    Type: AWS::Serverless::HttpApi

  GroupsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/_local/groups.ts
    Properties:
      CodeUri: ../../backend
      Handler: src/lambdas/_local/groups.handler
      Environment:
        Variables:
          TABLE_NAME_MAIN: !Ref TableNameMain
          FROM_EMAIL: !Ref FromEmail
      Events:
        ListGroups:
          Type: HttpApi
          Properties:
            Path: /groups
            Method: GET
            ApiId: !Ref LocalApi
        CreateGroup:
          Type: HttpApi
          Properties:
            Path: /groups
            Method: POST
            ApiId: !Ref LocalApi
        GetGroup:
          Type: HttpApi
          Properties:
            Path: /groups/{id}
            Method: GET
            ApiId: !Ref LocalApi
        UpdateGroup:
          Type: HttpApi
          Properties:
            Path: /groups/{id}
            Method: PATCH
            ApiId: !Ref LocalApi
        GetGroupBalances:
          Type: HttpApi
          Properties:
            Path: /groups/{id}/balances
            Method: GET
            ApiId: !Ref LocalApi
        AddGroupMember:
          Type: HttpApi
          Properties:
            Path: /groups/{id}/members
            Method: POST
            ApiId: !Ref LocalApi
        RemoveGroupMember:
          Type: HttpApi
          Properties:
            Path: /groups/{id}/members/{userId}
            Method: DELETE
            ApiId: !Ref LocalApi

  ExpensesFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/_local/expenses.ts
    Properties:
      CodeUri: ../../backend
      Handler: src/lambdas/_local/expenses.handler
      Environment:
        Variables:
          TABLE_NAME_MAIN: !Ref TableNameMain
      Events:
        ListExpenses:
          Type: HttpApi
          Properties:
            Path: /expenses
            Method: GET
            ApiId: !Ref LocalApi
        CreateExpense:
          Type: HttpApi
          Properties:
            Path: /expenses
            Method: POST
            ApiId: !Ref LocalApi
        GetExpense:
          Type: HttpApi
          Properties:
            Path: /expenses/{id}
            Method: GET
            ApiId: !Ref LocalApi
        UpdateExpense:
          Type: HttpApi
          Properties:
            Path: /expenses/{id}
            Method: PATCH
            ApiId: !Ref LocalApi
        DeleteExpense:
          Type: HttpApi
          Properties:
            Path: /expenses/{id}
            Method: DELETE
            ApiId: !Ref LocalApi

  ReceiptsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/_local/receipts.ts
    Properties:
      CodeUri: ../../backend
      Handler: src/lambdas/_local/receipts.handler
      Environment:
        Variables:
          TABLE_NAME_MAIN: !Ref TableNameMain
          BUCKET_UPLOADS_NAME: !Ref BucketUploadsName
          TEXTRACT_SNS_TOPIC_ARN: !Ref TextractSnsTopicArn
          TEXTRACT_ROLE_ARN: !Ref TextractRoleArn
      Events:
        UploadUrl:
          Type: HttpApi
          Properties:
            Path: /receipts/upload-url
            Method: POST
            ApiId: !Ref LocalApi
        GetScanStatus:
          Type: HttpApi
          Properties:
            Path: /receipts/{expenseId}/scan
            Method: GET
            ApiId: !Ref LocalApi

  AnalyticsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/_local/analytics.ts
    Properties:
      CodeUri: ../../backend
      Handler: src/lambdas/_local/analytics.handler
      Environment:
        Variables:
          TABLE_NAME_MAIN: !Ref TableNameMain
      Events:
        Summary:
          Type: HttpApi
          Properties:
            Path: /analytics/summary
            Method: GET
            ApiId: !Ref LocalApi
        Trends:
          Type: HttpApi
          Properties:
            Path: /analytics/trends
            Method: GET
            ApiId: !Ref LocalApi
        ChartData:
          Type: HttpApi
          Properties:
            Path: /analytics/chartData
            Method: GET
            ApiId: !Ref LocalApi
