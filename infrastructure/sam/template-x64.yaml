AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CostsCrunch local dev API — SAM CLI (Parameterized x86_64)

Parameters:
  TableNameMain:
    Type: String
    Default: costscrunch-dev-main
  BucketUploadsName:
    Type: String
    Default: costscrunch-dev-uploads-000000000000
  TextractSnsTopicArn:
    Type: String
    Default: arn:aws:sns:us-east-1:000000000000:costscrunch-dev-textract-completion
  TextractRoleArn:
    Type: String
    Default: arn:aws:iam::000000000000:role/test-role
  FromEmail:
    Type: String
    Default: noreply@costscrunch.dev

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Timeout: 30
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,X-Requested-With,Accept,Origin,X-Idempotency-Key'"
      ExposeHeaders: "'Content-Disposition'"
      AllowOrigin: "'*'"
      MaxAge: "'86400'"
    GatewayResponses:
      DEFAULT_4XX:
        ResponseParameters:
          Headers:
            Access-Control-Allow-Origin: "'*'"
            Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
            Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Requested-With,Accept,Origin,X-Idempotency-Key'"
      DEFAULT_5XX:
        ResponseParameters:
          Headers:
            Access-Control-Allow-Origin: "'*'"
            Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
            Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Requested-With,Accept,Origin,X-Idempotency-Key'"

Resources:
  GroupsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/groups/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Environment:
        Variables:
          TABLE_NAME_MAIN: !Ref TableNameMain
          FROM_EMAIL: !Ref FromEmail
      Events:
        GroupsRoot:
          Type: Api
          Properties:
            Path: /groups
            Method: ANY
        GroupsProxy:
          Type: Api
          Properties:
            Path: /groups/{proxy+}
            Method: ANY
        JoinGroup:
          Type: Api
          Properties:
            Path: /groups/{id}/join
            Method: POST

  ExpensesFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/expenses/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Environment:
        Variables:
          TABLE_NAME_MAIN: !Ref TableNameMain
      Events:
        ExpensesRoot:
          Type: Api
          Properties:
            Path: /expenses
            Method: ANY
        ExpensesProxy:
          Type: Api
          Properties:
            Path: /expenses/{proxy+}
            Method: ANY

  ReceiptsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/receipts/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Environment:
        Variables:
          TABLE_NAME_MAIN: !Ref TableNameMain
          BUCKET_UPLOADS_NAME: !Ref BucketUploadsName
          TEXTRACT_SNS_TOPIC_ARN: !Ref TextractSnsTopicArn
          TEXTRACT_ROLE_ARN: !Ref TextractRoleArn
      Events:
        ReceiptsRoot:
          Type: Api
          Properties:
            Path: /receipts
            Method: ANY
        ReceiptsProxy:
          Type: Api
          Properties:
            Path: /receipts/{proxy+}
            Method: ANY

  AnalyticsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/analytics/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Environment:
        Variables:
          TABLE_NAME_MAIN: !Ref TableNameMain
      Events:
        AnalyticsRoot:
          Type: Api
          Properties:
            Path: /analytics
            Method: ANY
        AnalyticsProxy:
          Type: Api
          Properties:
            Path: /analytics/{proxy+}
            Method: ANY

  ProfileFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/profile/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Environment:
        Variables:
          TABLE_NAME_MAIN: !Ref TableNameMain
      Events:
        ProfileRoot:
          Type: Api
          Properties:
            Path: /profile
            Method: ANY

  AuthFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/auth/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Environment:
        Variables:
          TABLE_NAME_MAIN: !Ref TableNameMain
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
      Events:
        AuthRegister:
          Type: Api
          Properties:
            Path: /auth/register
            Method: POST
        AuthConfirm:
          Type: Api
          Properties:
            Path: /auth/confirm
            Method: POST
        AuthLogin:
          Type: Api
          Properties:
            Path: /auth/login
            Method: POST
        AuthRefresh:
          Type: Api
          Properties:
            Path: /auth/refresh
            Method: POST
        AuthForgotPassword:
          Type: Api
          Properties:
            Path: /auth/forgot-password
            Method: POST
        AuthConfirmPassword:
          Type: Api
          Properties:
            Path: /auth/confirm-password
            Method: POST
        AuthConfirmMfa:
          Type: Api
          Properties:
            Path: /auth/confirm-mfa
            Method: POST
        AuthLogout:
          Type: Api
          Properties:
            Path: /auth/logout
            Method: POST
        AuthDeleteAccount:
          Type: Api
          Properties:
            Path: /auth/account
            Method: DELETE

  AuthTriggerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/auth-trigger/post-confirmation.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Environment:
        Variables:
          TABLE_NAME_MAIN: !Ref TableNameMain

  HealthFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/health/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Events:
        Health:
          Type: Api
          Properties:
            Path: /health
            Method: GET

  WsHandlerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/web-socket-handler/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler

  WsNotifierFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/web-socket-notifier/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Environment:
        Variables:
          WEBSOCKET_ENDPOINT: http://costscrunch-localstack:4566/_aws/apigatewayv2/ws
      Events:
        ScanCompletedRule:
          Type: EventBridgeRule
          Properties:
            EventBusName: costscrunch-dev-events
            Pattern:
              source:
                - costscrunch.receipts
              detail-type:
                - ReceiptScanCompleted

  SnsWebhookFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/sns-webhook/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Events:
        SnsWebhookSQS:
          Type: SQS
          Properties:
            Queue: !GetAtt ScanQueue.Arn
            BatchSize: 1

  ScanQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: costscrunch-dev-scan-queue
      VisibilityTimeout: 120
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ScanDlq.Arn
        maxReceiveCount: 3

  ScanDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: costscrunch-dev-scan-dlq
      MessageRetentionPeriod: 1209600
