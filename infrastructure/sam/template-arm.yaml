AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CostsCrunch local dev API — SAM CLI (ARM64 Optimized)

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - arm64
    Timeout: 30
    Environment:
      Variables:
        ENVIRONMENT: dev
        AWS_ENDPOINT_URL: http://costscrunch-localstack:4566
        AWS_ACCESS_KEY_ID: test
        AWS_SECRET_ACCESS_KEY: test
        AWS_REGION: us-east-1
        MOCK_AUTH: "true"
        TABLE_NAME_MAIN: costscrunch-dev-main
        TABLE_NAME_CONNECTIONS: costscrunch-dev-connections
        EVENT_BUS_NAME: costscrunch-dev-events
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,X-Requested-With,Accept,Origin,X-Idempotency-Key'"
      ExposeHeaders: "'Content-Disposition'"
      AllowOrigin: "'*'"
      MaxAge: "'86400'"
    GatewayResponses:
      DEFAULT_4XX:
        ResponseParameters:
          Headers:
            Access-Control-Allow-Origin: "'*'"
            Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
            Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Requested-With,Accept,Origin,X-Idempotency-Key'"
      DEFAULT_5XX:
        ResponseParameters:
          Headers:
            Access-Control-Allow-Origin: "'*'"
            Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
            Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Requested-With,Accept,Origin,X-Idempotency-Key'"

Resources:
  GroupsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/groups/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Environment:
        Variables:
          FROM_EMAIL: noreply@costscrunch.dev
      Events:
        GroupsRoot:
          Type: Api
          Properties:
            Path: /groups
            Method: ANY
        GroupsProxy:
          Type: Api
          Properties:
            Path: /groups/{proxy+}
            Method: ANY

  ExpensesFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/expenses/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Events:
        ExpensesRoot:
          Type: Api
          Properties:
            Path: /expenses
            Method: ANY
        ExpensesProxy:
          Type: Api
          Properties:
            Path: /expenses/{proxy+}
            Method: ANY

  ReceiptsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/receipts/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Environment:
        Variables:
          BUCKET_UPLOADS_NAME: costscrunch-dev-uploads-000000000000
          TEXTRACT_SNS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:costscrunch-dev-textract-completion
          TEXTRACT_ROLE_ARN: arn:aws:iam::000000000000:role/test-role
      Events:
        ReceiptsRoot:
          Type: Api
          Properties:
            Path: /receipts
            Method: ANY
        ReceiptsProxy:
          Type: Api
          Properties:
            Path: /receipts/{proxy+}
            Method: ANY

  AnalyticsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/analytics/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Events:
        AnalyticsRoot:
          Type: Api
          Properties:
            Path: /analytics
            Method: ANY
        AnalyticsProxy:
          Type: Api
          Properties:
            Path: /analytics/{proxy+}
            Method: ANY

  ProfileFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/profile/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Events:
        ProfileRoot:
          Type: Api
          Properties:
            Path: /profile
            Method: ANY

  HealthFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/health/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Events:
        Health:
          Type: Api
          Properties:
            Path: /health
            Method: GET

  SnsWebhookFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/lambdas/sns-webhook/index.ts
    Properties:
      CodeUri: ../../backend
      Handler: index.handler
      Events:
        SnsWebhookSQS:
          Type: SQS
          Properties:
            Queue: !GetAtt ScanQueue.Arn
            BatchSize: 1

  ScanQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: costscrunch-dev-scan-queue
      VisibilityTimeout: 120
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ScanDlq.Arn
        maxReceiveCount: 3

  ScanDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: costscrunch-dev-scan-dlq
      MessageRetentionPeriod: 1209600
